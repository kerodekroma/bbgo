<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="ball" x1="0.2" y1="0.1" x2="0.9" y2="0.9">
      <stop offset="0%" stop-color="#ff5252"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="34" cy="56" rx="18" ry="4" fill="rgba(0,0,0,0.15)"/>
  <!-- Bingo ball -->
  <circle cx="32" cy="32" r="28" fill="url(#ball)"/>
  <!-- Highlight -->
  <ellipse cx="24" cy="20" rx="10" ry="8" fill="rgba(255,255,255,0.25)"/>
  <!-- Letter B -->
  <text x="32" y="44" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">B</text>
</svg>
